version: 2
updates:
  - package-ecosystem: "pnpm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "sunday"
      time: "06:00"
    open-pull-requests-limit: 10
    commit-message:
      prefix: "chore(deps)"
    groups:
      core-framework:
        patterns:
          - "astro"
          - "@astrojs/*"
          - "@keystatic/*"
          - "resend"
          - "react"
          - "react-dom"
