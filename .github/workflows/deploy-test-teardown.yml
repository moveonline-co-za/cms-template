name: Ephemeral Infrastructure Test

on: [push]

jobs:
  deploy-test-teardown:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'pnpm'


      - name: Install Dependencies
        run: pnpm install

      - name: Create Isolated Test Branch & Environment Identifiers
        id: git_meta
        run: |
          RUN_ID="${{ github.run_id }}-${{ github.run_attempt }}"
          BRANCH_NAME="test/canary-${RUN_ID}"
          WORKER_NAME="temp-canary-${RUN_ID}"
          
          echo "branch_name=$BRANCH_NAME" >> $GITHUB_OUTPUT
          echo "worker_name=$WORKER_NAME" >> $GITHUB_OUTPUT

          git checkout -b "$BRANCH_NAME"
          git push origin "$BRANCH_NAME"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Astro Production Payload
        run: pnpm run build
        env:
          KEYSTATIC_SECRET: ${{ secrets.KEYSTATIC_SECRET }}
          KEYSTATIC_TARGET_BRANCH: ${{ steps.git_meta.outputs.branch_name }}

      - name: Pre-Deploy KV Namespace Cleanup
        run: |
          # Cleanup any orphaned legacy KV namespaces from previous failed runs
          KV_IDS=$(npx wrangler kv namespace list 2>/dev/null | jq -r '.[] | select(.title | contains("temp-template-canary") or contains("temp-canary")) | .id' || true)
          for KV_ID in $KV_IDS; do
            if [ -n "$KV_ID" ] && [ "$KV_ID" != "null" ]; then
              echo "🧹 Deleting lingering KV namespace $KV_ID..."
              npx wrangler kv namespace delete --namespace-id="$KV_ID" || true
            fi
          done
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy Ephemeral Cloudflare Worker
        id: cloudflare_deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy --name=${{ steps.git_meta.outputs.worker_name }} --var KEYSTATIC_TARGET_BRANCH:${{ steps.git_meta.outputs.branch_name }} --var CI_AUTH_BYPASS_TOKEN:${{ secrets.CI_AUTH_BYPASS_TOKEN }} --var RESEND_API_KEY:${{ secrets.RESEND_API_KEY }}

      - name: Run E2E Verification Flight
        run: |
          TARGET_URL="https://${{ steps.git_meta.outputs.worker_name }}.${{ secrets.CLOUDFLARE_SUBDOMAIN }}.workers.dev"

          # 1. Verify Application Delivery (with DNS propagation polling)
          echo "Waiting for $TARGET_URL to become active..."
          STATUS=0
          for i in {1..12}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$TARGET_URL" || echo "000")
            if [ "$STATUS" -eq 200 ]; then
              break
            fi
            echo "Attempt $i: App not ready yet (HTTP $STATUS). Retrying in 5s..."
            sleep 5
          done

          if [ "$STATUS" -ne 200 ]; then
            echo "❌ HTTP App Check Failed (got $STATUS) after 60s"
            exit 1
          fi
          echo "✅ App delivered — HTTP $STATUS"

          # 2. Test Astro Contact Action Endpoint
          ACTION_URL="${TARGET_URL}/_actions/sendContactEmail"
          echo "Testing Astro Action at $ACTION_URL..."
          RESPONSE=$(curl -s -w "\nHTTP_CODE:%{http_code}" \
            -X POST "$ACTION_URL" \
            -H "Content-Type: application/json" \
            -d '{"email": "canary@example.com", "message": "Automated pipeline validation script run."}')

          HTTP_CODE=$(echo "$RESPONSE" | grep "HTTP_CODE:" | cut -d':' -f2)
          BODY=$(echo "$RESPONSE" | grep -v "HTTP_CODE:")

          echo "Astro Action returned HTTP $HTTP_CODE (Response: $BODY)"
          if [ "$HTTP_CODE" -eq 200 ] || [ "$HTTP_CODE" -eq 500 ]; then
            echo "✅ Astro Action endpoint executed successfully — HTTP $HTTP_CODE"
          else
            echo "❌ Astro Action Execution Block Failed (got HTTP $HTTP_CODE)"
            exit 1
          fi

          # 3. Validate Keystatic Bypass Authenticator
          BYPASS_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "X-CI-Bypass-Token: ${{ secrets.CI_AUTH_BYPASS_TOKEN }}" \
            "$TARGET_URL/api/keystatic")
          if [ "$BYPASS_STATUS" -ne 200 ]; then echo "Keystatic Security Bypass Failure (got $BYPASS_STATUS)"; exit 1; fi
          echo "✅ Keystatic bypass authenticated — HTTP $BYPASS_STATUS"

      - name: Absolute Environmental Teardown
        if: always()
        run: |
          echo "🧹 Cleaning up deployment infrastructure and temporary branch state..."
          WORKER_NAME="${{ steps.git_meta.outputs.worker_name }}"

          # 1. Delete the ephemeral Cloudflare Worker
          if [ -n "$WORKER_NAME" ]; then
            echo "Deleting worker $WORKER_NAME..."
            echo "y" | npx wrangler delete --name="$WORKER_NAME" || true
          fi

          # 2. Delete auto-provisioned KV namespaces created during this run
          KV_IDS=$(npx wrangler kv namespace list 2>/dev/null | jq -r ".[] | select(.title | contains(\"$WORKER_NAME\")) | .id" || true)
          for KV_ID in $KV_IDS; do
            if [ -n "$KV_ID" ] && [ "$KV_ID" != "null" ]; then
              echo "Deleting KV namespace $KV_ID..."
              npx wrangler kv namespace delete --namespace-id="$KV_ID" || true
            fi
          done

          # 3. Delete the temporary remote test branch from GitHub
          git push origin --delete ${{ steps.git_meta.outputs.branch_name }} || true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
